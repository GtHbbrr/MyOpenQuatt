esphome:
  name: quatt-cic-bridge
  friendly_name: Quatt CiC Modbus Bridge
  on_boot:
    priority: 600
    then:
      - delay: 60s
      - if:
          condition:
            - switch.is_on: analytics_enabled_switch
          then:
            - mqtt.enable:              

esp32:
  board: esp32-s3-devkitc-1   # This is the closest officially supported board
  framework:
    type: esp-idf             # This usually fixes the Cache error on S3
    version: recommended
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_BT_ENABLED: n
  flash_size: 4MB

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80
  local: true

ota:
  - platform: esphome
    password: !secret QMB_ota
  - platform: web_server

http_request:
  buffer_size_tx: 1024

safe_mode:
  boot_is_good_after: 120s      # Increased from 30s or 60s
  # disabled: false            # keep it enabled for now

# Broker used to push analytics data (Opt-In)
mqtt:
  id: mqtt_client
  broker: mqtt.openamber.nl
  enable_on_boot: false
  username: openamber_write
  password: openamber
  reboot_timeout: 0s
  discovery: false
  discover_ip: false
  discovery_retain: false
  log_topic: null
  topic_prefix: null
  on_connect:
    - if:
        condition:
          - switch.is_on: analytics_enabled_switch
        then:
          - script.execute: fetch_analytics_device_id

# Enable Home Assistant API
api:
  encryption:
    key: "bCgjMAuWrpWokLfGt5g7bBSIvgPFbWUDa/G3G6tgLKg="  

# Minimal logger - no output on physical TX/RX pins
logger:
  level: ERROR

uart:
  - id: mod_bus
    tx_pin: GPIO06        # → SP3485 RX-I
    rx_pin: GPIO05        # → SP3485 TX-O
    baud_rate: 19200
    data_bits: 8
    parity: EVEN
    stop_bits: 1
    #rx_full_threshold: 1
    rx_timeout: 50
    rx_buffer_size: 512
    flow_control_pin: GPIO7
 
    #debug:
    #  direction: BOTH

# ====================== Modbus Server ======================
modbus:
  - id: quatt_modbus
    uart_id: mod_bus
    role: server
    send_wait_time: 50ms


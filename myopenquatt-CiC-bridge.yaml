# ====================== Globals (interne opslag) ======================
globals:
  - id: cic_working_mode_set
    type: uint16_t
    restore_value: no
    initial_value: "0"
  - id: cic_compressor_level_set
    type: uint16_t
    restore_value: no
    initial_value: "0"
  - id: cic_silent_mode_set
    type: uint16_t
    restore_value: no
    initial_value: "0"
  - id: cic_pump_mode_set
    type: uint16_t
    restore_value: no
    initial_value: "0"
  - id: cic_pump_level_set
    type: uint16_t
    restore_value: no
    initial_value: "0"
  - id: analytics_topic
    type: std::string
    restore_value: false
    initial_value: '"openamber/analytics/data"'
  - id: analytics_batch_timestamp
    type: int64_t
    restore_value: false
    initial_value: '0'

# ====================== Modbus Slave Registers ======================
modbus_controller:
  - id: quatt_cic
    modbus_id: quatt_modbus
    address: 1
    setup_priority: -100
    update_interval: never
    server_courtesy_response:
      enabled: true
      register_last_address: 5000
      register_value: 0    

    server_registers:
      # CiC -> HP control registers
      - address: 1999  # R1999 Compressor Level set by CiC
        value_type: U_WORD
        read_lambda: |-
          return id(cic_compressor_level_set);
        write_lambda: |-
          id(cic_compressor_level_set) = x;
          ESP_LOGI("modbus_server", "R1999 compressor level <- %u", x);
          return true;
      - address: 2006  # R2006 Silent mode set by CiC
        value_type: U_WORD
        read_lambda: |-
          return id(cic_silent_mode_set);
        write_lambda: |-
          id(cic_silent_mode_set) = x;
          ESP_LOGI("modbus_server", "R2006 silent mode <- %u", x);
          return true;
      - address: 2010  # R2010 Pump mode set by CiC
        value_type: U_WORD
        read_lambda: |-
          return id(cic_pump_mode_set);
        write_lambda: |-
          id(cic_pump_mode_set) = x;
          ESP_LOGI("modbus_server", "R2010 pump mode <- %u", x);
          return true;
      - address: 2015  # R2015 Pump level set by CiC
        value_type: U_WORD
        read_lambda: |-
          return id(cic_pump_level_set);
        write_lambda: |-
          id(cic_pump_level_set) = x;
          ESP_LOGI("modbus_server", "R2015 pump level <- %u", x);
          return true;
      - address: 3999  # R3999 Working mode set by CiC
        value_type: U_WORD
        read_lambda: |-
          if (id(hp1_set_working_mode_ha).state == "Cooling") return 1;
          if (id(hp1_set_working_mode_ha).state == "Heating") return 2;
          return 0;
        write_lambda: |-
          id(cic_working_mode_set) = x;
          ESP_LOGI("modbus_server", "R3999 working mode <- %u", x);
          return true;

      # HP -> CiC status registers
      - address: 2099  # R2099 Working Mode Actual
        value_type: U_WORD
        read_lambda: |-
          if (id(hp1_set_working_mode_ha).state == "Cooling") return 1;
          if (id(hp1_set_working_mode_ha).state == "Heating") return 2;
          return 0;
      - address: 2100  # R2100 Compressor AC Voltage
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2100).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
      - address: 2101  # R2101 Compressor AC Current
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2101).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v * 10.0f));
      - address: 2102  # R2102 Compressor Frequency Demand
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2102).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
      - address: 2103  # R2103 Compressor Frequency Actual
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2103).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
      - address: 2104  # R2104 Fan Speed Maximum
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2104).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
      - address: 2105  # R2105 Fan Speed Actual
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2105).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
      - address: 2106  # R2106 Reserved/unknown
        value_type: U_WORD
        read_lambda: |-
          return 0;
      - address: 2107  # R2107 Electric Expansion Valve
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2107).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
      - address: 2108  # R2108 Status bits
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2108).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
      - address: 2109  # R2109 Reserved/unknown
        value_type: U_WORD
        read_lambda: |-
          return 0;
      - address: 2110   # R2110 Outside Temperature
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2110).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf((v * 100.0f) + 3000.0f));          
      - address: 2111  # R2111 Evaporator Coil Temperature
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2111).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf((v * 100.0f) + 3000.0f));
      - address: 2112  # R2112 Gas Discharge Temperature
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2112).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf((v * 100.0f) + 3000.0f));
      - address: 2113  # R2113 Gas Return Temperature
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2113).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf((v * 100.0f) + 3000.0f));
      - address: 2114  # R2114 Reserved/unknown
        value_type: U_WORD
        read_lambda: |-
          return 0;
      - address: 2115  # R2115 DIPswitch readout
        value_type: U_WORD
        read_lambda: |-
          return 0x1800;
      - address: 2116  # R2116 Evaporator Pressure
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2116).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v * 10.0f));
      - address: 2117  # R2117 Condenser Pressure
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2117).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v * 10.0f));
      - address: 2118  # R2118 Status bits
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2118).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
      - address: 2119  # R2119 Alarm bits
        value_type: U_WORD
        read_lambda: |-
          return 0;
      - address: 2120  # R2120 Status bits
        value_type: U_WORD
        read_lambda: |-
          return 0;
      - address: 2121  # R2121 Status bits
        value_type: U_WORD
        read_lambda: |-
          return 0;
      - address: 2122  # R2122 Firmware Version
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2122).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
      - address: 2123  # R2123 EEPROM Version
        value_type: U_WORD
        read_lambda: |-
          return 0x0072;
      - address: 2124  # R2124 Reserved/unknown
        value_type: U_WORD
        read_lambda: |-
          return 0x0002;
      - address: 2125  # R2125 Reserved/unknown
        value_type: U_WORD
        read_lambda: |-
          return 0x2E78;
      - address: 2126  # R2126 Reserved/unknown
        value_type: U_WORD
        read_lambda: |-
          return 0;
      - address: 2127  # R2127 Main control board item number
        value_type: U_WORD
        read_lambda: |-
          return 0x0E37;
      - address: 2128  # R2128 Reserved/unknown
        value_type: U_WORD
        read_lambda: |-
          return 0x0BB8;
      - address: 2129  # R2129 Reserved/unknown
        value_type: U_WORD
        read_lambda: |-
          return 0x0BB8;
      - address: 2130  # R2130 Reserved/unknown
        value_type: U_WORD
        read_lambda: |-
          return 0;
      - address: 2131  # R2131 Condensing Temperature
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2131).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf((v * 100.0f) + 3000.0f));
      - address: 2132  # R2132 Evaporating Temperature
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2132).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf((v * 100.0f) + 3000.0f));
      - address: 2133  # R2133 Water In
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2133).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf((v * 100.0f) + 3000.0f));      
      - address: 2134  # R2134 Water Out met calibratiecorrectie van 0.2 graden
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2134).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf((v * 100.0f) + 3020.0f));      
      - address: 2135  # R2135 Condenser Coil Temperature
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2135).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf((v * 100.0f) + 3000.0f));
      - address: 2136  # R2136 Reserved/unknown
        value_type: U_WORD
        read_lambda: |-
          return 0x0BB8;
      - address: 2137  # R2137 Pump Power
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2137).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v * 10.0f));
      - address: 2138  # R2138 Pump Flow
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2138).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v / 0.618f));

      # The real HP returns 0xFFFF across this product-version block.
      - address: 11160
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11161
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11162
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11163
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11164
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11165
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11166
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11167
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11168
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11169
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11170
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11171
        value_type: U_WORD
        read_lambda: return 0xFFFF;
      - address: 11172
        value_type: U_WORD

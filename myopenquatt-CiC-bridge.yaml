# ====================== Tijd (voor timestamp) ======================
time:
  - platform: sntp
    id: my_time
    timezone: "Europe/Amsterdam"

script:
  - id: fetch_analytics_device_id
    then:
      - if:
          condition:
            lambda: return id(analytics_device_id).state.empty() && id(mac_address).has_state() && !id(mac_address).state.empty();
          then:
            - http_request.get:
                url: !lambda |-
                  return "https://openamber.nl/api/devices/by-mac/" + id(mac_address).state + "/device-id";
                capture_response: true
                on_response:
                  then:
                    - if:
                        condition:
                          lambda: return response->status_code == 200 && body.size() == 6;
                        then:
                          - lambda: |-
                              id(analytics_device_id).publish_state(body);

  - id: send_device_info
    then:
      - mqtt.publish_json:
          topic: !lambda 'return id(analytics_topic);'
          qos: 0
          retain: true
          payload: |-
            root["ts"] = id(analytics_batch_timestamp);
            root["fw"] = "0.0.4";       // ESPHOME_PROJECT_VERSION
            root["mo"] = "Quatt";    // device_model

            root["a1"] = id(hp1_r3257).state;   // id(model_identification_1)
            root["a2"] = id(hp1_r3300).state;   // id(model_identification_2)
            root["a3"] = id(hp1_r3343).state;   // id(model_identification_3)

            root["hn"] = id(hp1_r2127).state;   // id(outside_unit_hardware_item_number)

            root["ev"] = id(hp1_r2123).state;   // id(outside_unit_eeprom_version)
            root["e1"] = id(hp1_r3510).state;   // id(outside_unit_eeprom_version_part1)
            root["e2"] = id(hp1_r3509).state;   // id(outside_unit_eeprom_version_part2)

            root["pv"] = id(hp1_r2122).state;  // id(outside_unit_program_version)

  - id: send_config_1
    then:
      - mqtt.publish_json:
          topic: !lambda 'return id(analytics_topic);'
          qos: 0
          retain: true
          payload: |-
            root["ts"] = id(analytics_batch_timestamp);
            root["de"] = "0";   // id(dhw_enabled_switch)
            root["lg"] = "0";   // id(legio_enabled_switch)

            root["fa"] = "0";   // id(frost_protection_stage_1_temp_ta)
            root["fb"] = "0";   // id(frost_protection_stage_2_temp_ta)
            root["fc"] = "0";   // id(frost_protection_stage_2_temp_tui)

            root["ca"] = "0";   // id(compressor_start_delta)
            root["cb"] = "0";   // id(compressor_stop_delta)

  - id: send_modes
    then:
      - mqtt.publish_json:
          topic: !lambda 'return id(analytics_topic);'
          qos: 0
          retain: true
          payload: |-
            root["ts"] = id(analytics_batch_timestamp);

            root["wh"] = "0";   // id(heat_demand_switch).state;
            root["wc"] = "0";   // id(cool_demand_switch).state;

            root["ws"] = "0";   // id(dhw_schedule_enabled_switch).state;
            root["wp"] = "0";   // id(pump_p1_enabled).state;
  - id: send_telemetry_1
    then:
      - mqtt.publish_json:
          topic: !lambda 'return id(analytics_topic);'
          qos: 0
          retain: true
          payload: |-
            root["ts"] = id(analytics_batch_timestamp);
            root["th"] = "0";   // id(heat_demand_active_sensor).state;
            root["tc"] = "0";   // id(cool_demand_active_sensor).state;
            root["td"] = "0";   // id(dhw_demand_active_sensor).state;

            root["te"] = id(current_setpoint).state;
            root["tf"] = id(room_temperature).state;
            root["tg"] = id(hp1_r2110).state;                 //outside_temperature

            root["ti"] = id(flow_rate).state;                       // id(dhw_temperature_tw_sensor).state;
            root["tj"] = id(heat_cool_temperature_tc).state;
            root["tk"] = id(hp1_r2134).state;                 //outlet_temperature_tuo
            root["tl"] = id(hp1_r2133).state;                 //inlet_temperature_tui


  - id: send_telemetry_2
    then:
      - mqtt.publish_json:
          topic: !lambda 'return id(analytics_topic);'
          qos: 0
          retain: true
          payload: |-
            root["ts"] = id(analytics_batch_timestamp);
            root["ua"] = id(hp1_r2131).state;                 //condensate_temperature_tup
            root["ub"] = id(hp1_r2132).state;                 //evaporation_temperature_tp

            root["uc"] = id(hp1_r2113).state;                 //suction_temperature_ts
            root["ud"] = id(hp1_r2112).state;                 //discharge_temperature_td
            root["ue"] = id(hp1_r2116).state;                 //suction_pressure_ps
            root["uf"] = id(hp1_r2117).state;                 //discharge_pressure_pd

            root["ug"] = id(hp1_r2105).state;                 //fan_rpm_sensor
            root["uh"] = id(hp1_electricpower).state;         //power_compressor
            root["ui"] = id(hp1_r2103).state;                 //current_compressor_frequency

  - id: send_telemetry_3
    then:
      - mqtt.publish_json:
          topic: !lambda 'return id(analytics_topic);'
          qos: 0
          retain: true
          payload: |-
            root["ts"] = id(analytics_batch_timestamp);
            root["va"] = "0";   // id(backup_heater_active_sensor).state;
            root["vb"] = "0";   // id(internal_pump_active).state;
            root["vc"] = id(hp1_defrost_ha).state ? 1 : 0;              // defrost_active_sensor

            root["vd"] = "0";   // id(backup_heater_degmin_current_sensor).state;
            root["ve"] = "0";   // id(dhw_backup_current_avg_rate_sensor).state;

            root["vf"] = "0";   // id(state_machine_state_dhw).state;
            root["vg"] = "1";   // id(state_machine_state_heat_cool).state;
            root["vh"] = id(cic_working_mode_set);                      // id(state_machine_state_main).state;
            root["vi"] = id(sensor_uptime).state;

            root["vj"] = "0";   // id(current_dhw_setpoint_sensor).state;
            root["vk"] = "0";   // id(dhw_legionella_run_active_sensor).state;

            root["vl"] = "1";   // id(three way_valve_active_sensor).state;
            root["vm"] = "0";   // id(dhw_schedule_active_sensor).state;

            root["vn"] = id(hp1_pump_relay_ha).state ? 1 : 0;           // pump_p1_relay_switch
            root["vo"] = "0";                                           // id(dhw_pump_relay_switch).state;
            root["vp"] = id(hp1_r2107).state;                           // expansion_valve_position
            root["vq"] = id(hp1_r2137).state;                           // id(pump_p0_current_pwm_sensor).state;
            root["vr"] = id(cic_working_mode_set);
                              
  - id: send_analytics
    then:
      - lambda: |-
          id(analytics_batch_timestamp) = id(my_time).now().timestamp;
          ESP_LOGD("analytics", "Timestamp bijgewerkt: %lld", id(analytics_batch_timestamp));
      - script.execute: send_device_info
      - delay: 150ms
      - script.execute: send_config_1 
      - delay: 150ms
      - script.execute: send_modes
      - delay: 150ms
      - script.execute: send_telemetry_1
      - delay: 150ms
      - script.execute: send_telemetry_2
      - delay: 150ms
      - script.execute: send_telemetry_3
      - delay: 150ms
      - script.execute: fetch_analytics_device_id                    

switch:
  - platform: template
    id: analytics_enabled_switch
    name: "Analytics versturen"
    optimistic: True
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    setup_priority: 200
    on_state:
      then:
        - if:
            condition:
              - switch.is_on: analytics_enabled_switch
            then:
              - mqtt.enable:
            else:
              - mqtt.disable:

interval:
  - interval: 5min
    then:
      - if:
         condition:
          - switch.is_on: analytics_enabled_switch
         then:
          - script.execute: send_analytics                        

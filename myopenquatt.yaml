      then:
        - text_sensor.template.publish:
            id: version_display          
            state: !lambda |-
              int val = (int)x;
              int main_code = (val >> 8) & 0xFF;
              int slave_code = val & 0xFF;
              char buffer[32];
              sprintf(buffer, "(%d, 0x%04X) V%03d_T%02d", val, val, main_code, slave_code);
              return (std::string)buffer;

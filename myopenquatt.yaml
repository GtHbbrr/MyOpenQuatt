substitutions:
  device_name: heatpump-listener
  friendly_name: Heat Pump Listener - Quatt
  time_timezone: "Europe/Amsterdam"
  throttling_value: 10s
  version: quatt-single-2relay

esphome:
  name: heatpump-openquatt
  friendly_name: MyOpenQuatt
  min_version: 2025.12.0
  project:
    name: "teslanerd.heatpump-openquatt"
    version: "0.1.3"

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true 
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_BT_ENABLED: n         

switch:
  - platform: gpio
    pin: GPIO22
    name: Relay 1
    restore_mode: RESTORE_DEFAULT_OFF
    web_server:
      sorting_group_id: openquatt_control
  - platform: gpio
    pin: GPIO23
    name: Relay 2
    restore_mode: RESTORE_DEFAULT_OFF
    web_server:
      sorting_group_id: openquatt_control
  - platform: modbus_controller
    name: "Low noise mode"
    modbus_controller_id: modbus_hp1
    register_type: holding
    address: 2006
    bitmask: 1
    web_server:
      sorting_group_id: heatpump_control
  - platform: modbus_controller
    name: "Pump relay"
    id: modbus_pump_relay
    modbus_controller_id: modbus_hp1
    register_type: holding
    address: 2010
    bitmask: 4096
    web_server:
      sorting_group_id: heatpump_control         

logger:
  level: WARN
  baud_rate: 0
  logs:
    # This specifically silences the state changes [S] for these types
    sensor: NONE
    number: NONE
    select: NONE
    switch: NONE
    binary_sensor: NONE
    modbus_controller: WARN  # Keeps the important Modbus errors visible

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  id: webserver_component
  port: 80
  version: 3
  sorting_groups:
    - id: heatpump_control
      name: "Heatpump Control"
      sorting_weight: -20
    - id: heatpump_alarms
      name: "Alarms"
      sorting_weight: -10      
    - id: openquatt_control
      name: "OpenQuatt Control"
      sorting_weight: 20
    - id: heatpump_settings
      name: "EEPROM Settings"
      sorting_weight: 40
    - id: oq_diagnostics
      name: "Diagnostics"
      sorting_weight: 50

uart:
  id: uart_component
  rx_pin: GPIO32
  tx_pin: GPIO33
  parity: EVEN
  data_bits: 8
  stop_bits: 1
  baud_rate: 19200
  rx_full_threshold: 1
  rx_timeout: 1
  rx_buffer_size: 512

modbus:
  flow_control_pin: GPIO21
  send_wait_time: 100ms 

modbus_controller:
  - id: modbus_hp1
    address: 0x01 
    update_interval: 5s
    command_throttle: 300ms
    max_cmd_retries: 1
    offline_skip_updates: 5
    setup_priority: -10    

output:
  - platform: gpio
    id: led_yellow_output
    pin: GPIO18

light:
  - platform: binary
    id: led_yellow
    output: led_yellow_output
  - platform: status_led
    id: led_red
    pin:
      number: GPIO19

globals:
  - id: sensor_fail_count
    type: int
    initial_value: '0'

interval:
  - interval: 30s
    then:
      - lambda: |-
          float temp = id(outside_temp_sensor).state;
          bool sensor_bad = std::isnan(temp);
          
          bool is_standby = false;
          if (id(working_mode).active_index().has_value()) {
            is_standby = (id(working_mode).active_index().value() == 0);
          }

          if (sensor_bad) { id(sensor_fail_count)++; } 
          else { id(sensor_fail_count) = 0; }

          // 1. TRIGGER: Below 7°C OR sensor dead for 5 mins
          if ((!sensor_bad && temp < 7.0) || id(sensor_fail_count) >= 10) {
            // Only trigger if in Standby
            if (is_standby) {
              
              auto call = id(modbus_pump_level).make_call();
              call.set_value(770);
              call.perform();
              
              id(modbus_pump_relay).turn_on();
              ESP_LOGW("antifreeze", "Cold/Error: Protection started.");
            }
          } 
          
          // 2. RELEASE: Above 9°C AND in Standby
          else if (!sensor_bad && temp > 9.0) {
            // Only stop if:
            // - We are in Standby
            // - The relay is ON
            // - AND the pump is at the low antifreeze speed below 500L/h (level >= 760)
            // This prevents killing the pump during the 'Heating' startup priming.
            if (is_standby && id(modbus_pump_relay).state == true && id(modbus_pump_level).state >= 760) {
            
              id(modbus_pump_relay).turn_off();
              ESP_LOGW("antifreeze", "Warm & Standby: Pump stopped safely.");
            }
          }

button:
  - platform: restart
    name: Restart OpenQuatt
    web_server:
      sorting_group_id: openquatt_control
  - platform: factory_reset
    id: button_factory_reset
  - platform: template
    name: "Restore Teslanerd Defaults"
    id: reset_to_defaults
    icon: "mdi:factory"
    web_server:
      sorting_group_id: heatpump_settings
    on_press:
      then:
        - logger.log: "Restoring default Teslanerd parameters..."
        
        # Restore DC Fan Defaults
        - number.set:
            id: r3304 #DC Fan high speed power
            value: 65    
        - number.set:
            id: r3305 #DC Fan medium speed power
            value: 68    
        - number.set:
            id: r3306 #DC Fan low speed power
            value: 70    

        # Restore HeatingHz F-Registers (Examples)
        - number.set:
            id: r3011 #HeatingHz level00
            value: 0    
        - number.set:
            id: r3012 #HeatingHz level01
            value: 30    
        - number.set:
            id: r3013 #HeatingHz level02
            value: 39    
        - number.set:
            id: r3014 #HeatingHz level03
            value: 49    
        - number.set:
            id: r3015 #HeatingHz level04
            value: 55   
        - number.set:
            id: r3016 #HeatingHz level05
            value: 61   
        - number.set:
            id: r3017 #HeatingHz level06
            value: 67   
        - number.set:
            id: r3018 #HeatingHz level07
            value: 72   
        - number.set:
            id: r3019 #HeatingHz level08
            value: 79   
        - number.set:
            id: r3020 #HeatingHz level09
            value: 85   
        - number.set:
            id: r3021 #HeatingHz level10
            value: 90   


        - logger.log: "All parameters restored to preset defaults."    

  - platform: template
    id: oq_debug_modbus_read_hp1
    name: "Debug Read HP1 register"
    icon: mdi:database-search
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_diagnostics
    on_press:
      - lambda: |-
          // Read the target register and build a one-shot Modbus read command.
          using namespace esphome::modbus_controller;
          const uint16_t reg = (uint16_t) lroundf(id(oq_debug_modbus_register).state);
          auto cmd = ModbusCommandItem::create_read_command(
              id(modbus_hp1), ModbusRegisterType::HOLDING, reg, 1,
              [reg](ModbusRegisterType, uint16_t, const std::vector<uint8_t> &data) {
                // Decode the response and publish the raw/u16/s16 views.
                if (data.size() < 2) {
                  id(oq_debug_modbus_last_target).publish_state("HP1 reg " + std::to_string(reg));
                  id(oq_debug_modbus_last_raw).publish_state("ERR: short response");
                  return;
                }
                const uint16_t u16 = (uint16_t(data[0]) << 8) | uint16_t(data[1]);
                const int16_t s16 = (int16_t) u16;
                char raw[20];
                snprintf(raw, sizeof(raw), "0x%02X 0x%02X", data[0], data[1]);
                id(oq_debug_modbus_u16).publish_state((float) u16);
                id(oq_debug_modbus_s16).publish_state((float) s16);
                id(oq_debug_modbus_last_target).publish_state("HP1 reg " + std::to_string(reg));
                id(oq_debug_modbus_last_raw).publish_state(raw);
              });
          // Queue the command after the callback is fully configured.
          id(modbus_hp1)->queue_command(cmd);        

